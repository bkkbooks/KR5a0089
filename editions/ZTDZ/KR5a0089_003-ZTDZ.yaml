body:
  text: 正一嗣教道合无爲闡祖光範真人領道教事四十三代天師張宇初註元洞玉曆龍漢延康眇眇億劫混沌之中少微曰此論劫運成壞故有龍漢延康之㫖龜山玄籙云元洞上皇炁也天尊結元洞之炁爲玉曆之書以龍漢劫爲初劫開圖曰赤明劫終曰延康劫循環無窮終而復始劫終之後三界空壞萬物精爽長在太空故曰延康爲壞劫之稱赤明為開圖之始九品經曰昔混元溟涬諸天未分元始肇形五劫初化乃命梵元祖晨道君肇録天元運乘五劫故元洞者以成祖炁玉曆者以紀天元自一炁化分三因成九若龍若蜒蟠曲九道漠漠無極總九陽祖炁之元太上乃運梵合炁開始青天元祖炁故東方得九炁以分天境劫號龍漢南方得三炁以分天境劫號赤明中央得十二炁以分天境劫號上皇西方得七炁以分天境劫號延康北方得五炁以分天境劫號開皇五劫既周昊天成象一炁混道八景流光八帝示形九霄分化結元洞五陽之炁爲玉曆乃命天眞皇人以玉曆紀元洞之初劫運流復之本天眞天民學仙功績升退之道夫元洞者元始大洞之祖炁也由祖炁結而成玉曆天眞皇人按筆以紀劫運之數始於龍漢終於延康歷劫之乆成壞非一聚散不常散而復聚仍歸于混沌之中不知其幾千萬億眇眇而不可窮也上无復色下无復淵風澤洞虛金剛乘天天上天下无幽无冥无形无影无極无窮溟涬大梵寥廓无光默菴曰此引龍漢祖劫之事以啓赤明第二劫開圖之㫖也龍漢之劫旣壞天地上下皆非色象可見也嚴東曰每劫運終三光晦冥天地混沌上有何色下有何淵是矣薛幽棲曰風澤者道之炁金剛者精之炁道炁至柔則洞洽於虚精炁至剛則運乘於天蕭觀復曰風者有炁無形澤者有形無質乃虚无自然之理所謂道之炁是矣金者亘古今不變剛者堅貞不壞是純眞至妙之精所謂精之炁是矣幽冥者陰境也窮極者邊際也溟涬者天地未分之初也劫運既終天地雖大皆形氣所有亦隨劫遷革是以上下不可以色淵求矣惟風澤之炁空洞虛无金剛不壞天地之炁乘之以運行猶天行健也乾剛内運陰翳漸除是以天上天下混沌一炁亦無幽冥亦無形影運行不息亦無窮極矣溟溟涬涬若天地未分之先胚腪磅礴皆大梵之炁周流寥廓者八極之表不可名狀故曰无光其光内藴而未明也脩鍊之士視身如漚泡終有生滅採先天眞一之炁於父母未生之前猶天地溟涬初判再禀乾金至剛之炁以成金胎是爲一靈妙有歷劫長存雖劫運變遷三界消壞萬有俱空而此性居洞虚之妙獨立而不改周行而不殆是也則其自彊不息宜無有窮極矣大梵之炁内結而爲丹基寥廓無際含光不曜乃陰陽之初判陰盡而後陽純矣赤明開圖運度自然元始安鎮敷落五篇赤書玉字八威龍文保制劫運使天長存默菴曰外四篇前四天是也中一篇後四天是也赤明者劫名也青元曰至赤明之初大運啓圖玉曆定紀天地再開於是天地日月星辰山川物象一時分判晝夜寒暑四時推遷罔有差忒故曰運度自然元始安鎮者祖炁復肇安天鎮地五篇者元始出梵炁結形成雲篆天章載妙元神眞道五者故曰五篇赤書玉字者默菴曰外篇鎮外赤書者陽施朱象日中篇鎮中玉字者陰施白象月又混洞赤文也開圖之後赤文乃復宣布刻玉爲書以安鎮也八威龍文者默菴曰外四天内四天共八方皆龍文又八龍之籙能禦伏妖異䇿役鬼神是以其功用可保制劫運之變更而與天齊永矣人之有身性命之道一焉然命有終盡而性無淪壞是以脩持定慧者深究死生之說幽明之故以至能盡性致命而後性根不滅命蒂長存直證七返九還之妙縱經億劫其苦輪既滅是爲長生久視後天而終矣梵炁彌羅萬範開張元綱流演三十二天輪轉無色周迴十方旋斗歷箕回度五常默菴曰此言第二劫赤文再立天地之功用也赤文再立天地復位萬物復育元始祖劫之梵炁彌滿包羅諸天之上含生品彙由是一炁化生開張顯露而後萬物始備梵炁流布發而成文是爲典謨訓誥經藏文録垂範無窮雖百千萬條之廣皆梵炁之發育也由萬範一張綱紀遂立元綱者若綱之有綱也範謨旣張綱紀流演而不息是以徧周三十二天輪轉至於无色之界周迴一帀十方皆至終而復始元一息之間斷无不周徧矣旋斗歷箕者斗中斗也即心也箕屬東方艮寅之位每歲立春則杓昏建於寅初與天左旋歷始於箕居其中而順建十二辰五常者五星也不曰五行五星而曰五常斗運於中五行各盡其功用乃天地之常道也一歲十二辰周而復始旋歷斗箕之始日月五星逆行周回三百六十五度斗柄指地先天之眞炁亦隨斗柄内運從九地發生萬物矣人身一日之間有一年之節炁循歷二十八宿二十四炁七十二候六十四卦以成周天之火候也以人身而測天度陽生於子至寅爲三陽象泰由下田而上也漸歷斗箕而周流六虚皆己眞一之炁周回十方循度五行之常道也以心中虚運行不息無不輪轉而至矣所謂動静無端陰陽無始者是也三十五分總炁上元八景冥合炁入玄玄玄中太皇上帝高眞汎景太霞嘯詠洞章默菴曰元者首之上八景即八節也四時四方各有八景所以合成八八六十四卦觀復曰三十五分陰陽五行二十八宿也考之都分尺部亦曰測日月五星之行分二十八宿之度故曰三十五分以日月合璧五星連珠攢簇二十八宿是曰總炁分之則爲三十五總之則一炁也上元者曆法以上古十一月朔夜半冬至日月五星會於子謂之上元八景者即生神中三部八景也玄中太皇者玄元始三炁中之三寳君是爲上帝高眞太霞之景梵清景三炁之上洞章即下文金眞朗郁嘯詠而歌也脩之於内日月合璧則水火旣濟五炁朝元則鉛汞擒制乃奪天地之造化攢簇爐鼎之中循歷二十八宿行周天之火候採藥於冬至之首奪一年之節炁於一陽初動之始是爲總炁上元故曰元者首之上也一炁上升於泥丸則八節之氣候皆冥合矣是以直入玄玄之中恍惚杳冥中之有精也而我元神祖炁會於太淵之頂即上帝高眞之汎景於三炁之上矣若太霞流彩空洞成音而嘯詠欣悦有自然之感也金眞朗郁流響雲營玉音攝炁靈風聚煙紫虚鬱秀輔翼萬仙千和萬合自然成眞默菴曰自此句以下至各有生門乃高眞之洞章也金眞者金精也乃天地之靈根陰陽之祖炁先天眞一之精至陽之炁玉音者龍吟虎嘯之聲也紫虚者中黄之宫也金母既歸神室丹基已兆金胎已萌眞神明耀晃如金精之朗徹龍虎二弦之炁出火生水之時玉音流響靈風内鼓則炁歸神室養成鄞鄂中黄土釜之中紫光紅彩攝炁聚煙而後秀結成眞鬱勃内外萬炁歸眞若水朝宗若車輻凑神暢炁和千神和爲一神萬炁合爲一炁莫非自然之理内合成眞此皆還丹至妙至神之機非假有爲而成也經曰迴風混合百日功成契曰經營養鄞鄂凝神以成軀是也眞中有神長生大君无英公子白元尊神太乙司命桃康合延執符把籙保命生根眞中有神者即元神爲性之本以其曩劫不壞是曰長生大君恍惚中之有物杳冥中之有精其精甚眞其中有信是也无英肝神白元肺神太乙乃百神之主司命心神桃康合延二腎之神古愚曰總舉四神而言者謂金木不間隔水火不相尅也五神不言脾神謂非中意不能和合四象則神在其中矣是以太乙居中以象五行全籍於土丹道中則坎納戊土離納己土是曰坎戊月精離己日光水火之交姤鉛汞之投合金木之合并皆中意媒合之也脩鍊之工至妙至神之機不越乎五行順逆之理而已人能舍日用之順境以究顛倒之妙四象和合五行攢簇則命蒂愈固性根長生矣是爲至眞中之有至神也觀復曰眞神保其性命靈炁護其生根是也符籙者以有象言之則元始符命也内求無象皆己之眞炁也能執持不怠則可保固元命而死魂受度復生根矣上遊上清出入華房八冥之内細微之中下鎮人身泥丸絳宫中理五炁混合百神十轉回靈萬炁齊仙默菴曰此言學士脩鍊成眞之由上清者泥丸宫也華房者三境華房也八冥者八極也泥丸者腦頂也絳宫者心也五炁者五行也百神者身中之神也此蓋脩鍊成眞之驗眞中之神靈妙已具是以升降周流而不息上則遊於天門上清華房之間周行八極之内雖細微毫芒亦無不至下則鎮人身復還本身之中自泥丸下絳宫而歸中宫玄關也中者一身之中也曰執中守中規中環中一中黄中皆一理也茍眞息内定中虚外明而炁自調理矣五炁者精神魂魄意也調息至於無息則心浄神凝五炁内理百神内合周而復始流行不息周回至於十轉眞中之神靈妙莫測身中之萬炁皆齊入仙道矣此乃内丹十月功圓道備之應也所謂追二炁於黄道會三性於元宫攝情還性歸根復命之妙盡於十轉之功矣仙道貴生无量度人上開八門飛天法輪罪福禁戒宿命因緣普受開度死魂生身身得受生上聞諸天諸天之上各有生門默菴曰此言世人罪福報應而終可普受開度之恩也仙道長生之謂也故太上惟好生初無限量之拘是以普度無窮八門者八方法輪之門人世罪福善惡皆由心造是有天堂地獄之分人之溺於貪嗔之蔽不知禁戒或宿世今生結習纏染而成故有輪轉之報今蒙天尊大慈普受開度上開八方之門轉動法輪使靈光慧燭如飛天之疾下徹幽扄則死魂受度而生身矣旣得受生必假元始符命徧告諸天然後諸天隨其善功禀賦受生生身則有仙階高下之品死魂則隨果受生之門而各受開度之恩也生門即生神所謂生門死户也諸天之上各有所隸焉中有空洞謡歌之章魔王靈篇辭參高眞默菴曰此魔王歌章之序引元始褒取其篇以其參合高眞洞章之辭空洞者即前所謂天中空洞也謡歌者魔王歌章也此三界魔王歌章之序引元始以其辭語與洞章叅合故取以叅之高眞之中是曰靈篇經法云洞章者乃龜山丹黄飛玄紫文非魔王所作也太上布此三章於世今人開悟超出三界昔天尊降魔魔王悉皆稽首受事敕魔王統治三界各歌謡章變化飛空警戒天人屏絶欲鬼令人聞此飛空之音轉色欲苦歸清浄門上文曰諸天之上各有生門繼之曰中有空洞謡歌之章則諸天之中自有空洞之章也其魔王所作飛空歌音義在敬戒理契天眞是足以叅於高眞也第一欲界飛空之音默菴曰欲界者天人之際在人身即心腎界也超鬼道則爲人入仙道則飛空古愚曰魔王諱郁默道經云凡人口業浄有十善功以上生欲界六天靈寳經法云自黄曾至摩夷爲欲界六欲俱浄則升色界人道眇眇仙道莽莽鬼道樂兮當人生門天道貴生鬼道貴終仙道常自吉鬼道常自凶高上清靈爽悲歌朗太空惟願仙道成不欲人道窮北都泉曲府中有萬鬼羣但欲遏人筭斷絶人命門阿人歌洞章以攝北羅酆束送妖魔精斬馘六鬼鋒諸天炁蕩蕩我道日興隆默菴曰此言吾身之北都泉曲府即北都羅酆也萬鬼羣即妖魔精六鬼鋒也我能攝伏之束送之斬馘之則天炁日長於我而仙道日成於我矣眇眇者輕眇也莽莽者高遠也生門者生死關也靈爽者鬼趣也泉曲府身中之北陰也命門即命蔕也人道眇邈微而難盡仙道高遠幽而難明是以人自有形即貪著染縛目之於色耳之於聲鼻之於臭口之於味皆三毒六欲之根是有三途五苦之報也以人不能修仙道故鬼道快樂當人生死之門務欲人之死絶也故天道好生而鬼則貴終矣然則趨于仙道者務欲崇德積善其自召者靡不吉淪於鬼道者務欲賊德害善其自求者靡不凶矣高上清靈爽魔王言其所居之高廣非靈爽所能侵也朗然悲歌飛遊太空蓋憫人之去仙道遠也惟願學者仙道之成不欲人道之窮極也北都泉曲府即北都羅酆也冥關岱嶽所治職掌罪罰校録愆過三界四司嶽瀆隍社凡遇三元八節五臘三會考校功過毫髮無私若能持善脩福則延壽長年爲惡致禍則滅筭除年録送酆都泉曲矣其羅酆之府有萬鬼羣本欲遏絶人之壽筭以斷人之命根不欲仙道之成也北都羅酆在人身即愛河慾海也不能窒慾養心則妄念紛飛皆爲妖魔精矣阿人歌詠空洞之章以攝制羅酆之鬼趣束送之斬馘之使妖魔六鬼之鋒刃頓爾泯息内功外行旣積萬善日備則諸天之正炁蕩蕩我道由此而興隆矣第二色界魔王之章默菴曰色界者中天之天在人即心目界也無染著則能變化飛昇矣少微曰魔王諱摩羅道經云身業浄有三百善功生色界自越行天至曇誓天共一十八天爲色界此天之人有形無欲分麄細輕一十八塵塵染俱浄升无色界落落高張明炁四騫梵行諸天周回十方无量大神皆由我身我有洞章萬徧成仙仙道貴度鬼道相連天地眇莽穢氣氛氛三界樂兮過之長存身度我界體入自然此時樂兮薄由我恩龍漢蕩蕩何能别眞我界難度故作洞文變化飛空以試爾身成敗懈退度者幾人笑爾不度故爲歌音落落者天體之廓落也明炁者梵炁明潔四方周布流行於諸天十方周帀俱徧矣无量大神魔王言其變化无量皆其身中之神也洞章即前所謂乃龜山丹黄飛玄紫文具載靈寳法中非魔王歌也萬徧者必眞積力乆然後力到功圓而成仙矣非惟誦之多也仙道所貴者長生度世也鬼道所牽連者人不能自脩身殁炁散魂神被考累貽祖玄矣天地之廣大眇莽難窮而穢濁之氣紛紜交結於其中三界之内惟過度者可以長存而獲至樂我界乃魔王自謂也能過度此界則體合自然結習俱忘升入无形矣至此則六根俱浄八識俱空湛然一眞其樂無際雖由功滿德就而然亦自魔王保舉而仙故曰薄由我恩也龍漢者元始初劫之名蕩蕩廣漢無際也當祖劫之初大朴未散渾然本性之眞豈有精粗純雜之别自人欲既萌情識交蔽則本然之性遂有區别業識流轉無已至乃我界難度矣是作此洞文以訓勵之欲人證道成眞以度此界也洞文即歌章也變化飛空魔王言其神化無方以試學道之心或試以所欲或試以所畏或試以所不欲不畏日久月深心如鐵石終無退怠則道功成矣然而成敗懈退不爲魔所沮棄而竟度三界者復幾人哉或中道而廢致貽魔王之笑其不度也設爲歌音良有所勉迪焉此其脩鍊之士必平素積功累行有以通于神明則内魔不生外魔自息道功乃就而可度世矣第三无色界魔王歌曰默菴曰无色界在天爲天頂在人則爲泥丸頂也少微曰魔王諱韶道經云心業浄有六百善行生无色界四天自皓庭天至秀樂四天爲无色界本際經曰煩惱爲結學業爲習結習已盡超種民位洞入道境隨炁升降灾所不及也三界之上眇眇大羅上无色根雲層峨峨唯有元始浩劫之家部制我界統承玄都有過我界身入玉虛我位上王匡御衆魔空中萬變穢氣紛葩保眞者少迷惑者多仙道難固鬼道易邪人道者心諒不由他仙道貴實人道貴華爾不樂仙道三界那得過其欲轉五道我當復奈何默菴曰眇眇大羅指三十二天之頂也天以北極部制諸天上无色根指三百六十骨節之頂也人以百會部制一身觀復曰三界之上即種民四天之上即大羅天也大羅天上有玉京山層雲所覆元始天尊自浩劫以來宅居其中部制三界統治玄都大羅玉清之境我界即无色界也玉虚乃虚无玉京也脩鍊之士得度无色界入四種民天則身入玉虚之境矣我位上王魔王自謂其功品居諸魔王之上是以衆魔皆由其匡御也下視虚空之中色塵業垢起滅萬變穢濁之氣紛葩交繞是以能保固本眞者甚少而迷惑昏妄者愈多仙道則不得堅固而惟入于鬼道之邪妄矣人道者心收之則萬殊一本放之則一本萬殊物物各具一太極莫非此心也人心道心存心養心正心脩心觀心澄心照心三教同一心法也豈有它哉仙道貴實者誠實無妄也人道則樂於華競矣苟不好樂仙道思自脩之豈能過三界之上也故必轉五道之苦輪我亦將如之奈何此蓋魔王訓勵之切也五道者神人禽獸餓鬼地獄也此三界之上飛空之中魔王歌音音參洞章誦之百徧名度南宫誦之千徧魔王保迎萬徧道備飛升太空過度三界位登仙公此總讚前歌章也魔王在三界之上飛行太空之中作爲歌音可參合洞章之微妙使學者日進於道自欲界而色界至无色界誦詠其音至百而千而萬徧莫非恐人有懈退之心而欲其念念歸眞也此所以身道之難成非志堅行篤所不能至也必至萬徧而後道備乃可飛升太空遇度三界之上而位證仙公矣仙公者太極仙品之至高也況萬徧非徒口誦也必内功外行深積厚培之力而後方能上升太空位登仙品也故天尊取以續於正經讚之曰靈篇靈音其所感召可謂至重矣是以其辭參高眞音參洞章也有聞靈音魔王敬形敕制地祇侍衛送迎拔出地户五苦八難七祖升遷永離鬼官魂度朱陵受鍊更生是謂无量普度无窮有秘上天文諸天共所崇泄慢墮地獄禍及七祖翁默菴曰此言魔章普度之功學士泄慢之報元始説經之言止此靈音讚重魔王之歌音也有能聞是音而脩之不怠者魔王敬奉其形神矣故觀復曰聞非耳聞也必心與經通行與經合是也念念不忘常存敬懼外遣諸緣内脩定力乆之功深行滿上帝勑命地祇祀典之神侍衛其居處送迎其出入雖道未備不能度三界位仙公亦必拔出地户離死户也無復五苦八難之厄矣其功則上及七祖皆獲升遷永離幽關不屬鬼官之所考攝魂神逕度朱陵火府而更生樂界矣是以生死皆蒙其无量之功无窮之度矣内功至此聖胎已就脱體神化陰盡陽純直超三界之上七祖同升矣雖然經功之效昭著若此祕於諸天之上共所尊崇苟有泄慢之愆不惟身墮地獄則必禍延七祖可不戒之慎之道言此二章並是諸天上帝及至靈魔王隱祕之音皆是大梵之言非世上常辭言無韻麗曲無華宛故謂玄奥難可尋詳上天所寳祕於玄都紫微上宫依玄科四萬劫一傳若有至人齎金寳質心依舊格吿盟十天然後而付焉默菴曰自此至洞明至言五段是道君再序經文玄妙之功用乃正經之後序也此二章靈寳後序指言此二章者即前上一章元始洞玄靈寳本章及下一章中有空洞謡歌之章也上天所寳此道君再序經文玄妙上天寳愛之意觀復曰此二章混洞赤文元洞玉曆是也一明先天之道一明後天之道混洞赤文章言天帝名諱五天號諱其文主於超拔玄祖受度生身敷落普度歷關告命之㫖元洞玉曆章言劫運成敗混沌開闢元炁周流採取修鍊歸根復命超凡入聖之道故曰皆隱祕之音大梵之言非世之常辭所能至也言無韻麗謂天尊經㫖之潔浄精微也曲無華宛謂魔王歌章之明白簡直也然其義玄奥幽微學者不能盡究其詳密若夫默菴祖師之謂自靈寳本章至謡歌之章爲二章者其文義亦同而赤文玉曆在其中矣皆隱祕大梵之言故上天之寳於玄都紫微之宫必依玄科禁戒經累劫而後傳又豈敢輕泄妄受也哉至士之欲受經者必齎金質心依天眞條格告盟天眞上聖而後付受其可輕忽妄授視爲常辭也乎此皆道君諄篤之至訓也道言夫天地運度亦有否終日月五星亦有虧盈至聖神人亦有休否末學之夫亦有疾傷凡有此灾同氣皆當齊心脩齋六時行香十徧轉經福德立降消諸不祥无量之文普度无窮天地爲萬物之根本畢竟囿於形氣運數亦有否泰故遇陽九百六之厄三界消亡壞而後復成日月五星之衡度亦有薄蝕盈縮至聖神人亦有通塞休否而況末學之夫寧無疾傷故凡有疾厄之苦必當甘受忽怨以順其天也然人與天地萬物均一炁也是曰一本萬殊也先儒以乾爲父坤爲母民吾同胞物吾一體者此也故凡有是灾同氣皆當齊心修齋六時行香十徧轉經雖上消天灾下度兆民捍厄扶衰無所禱而不應是致福德立降消諸不祥皆十徧經之效也可謂無量之文普度天人於無窮矣道言夫末學道淺或仙品未充運應滅度身經太陰臨過之時同學至人爲其行香誦經十過以度尸形如法魂神徑上南宫隨其學功計日而得更生轉輪不滅便得神仙此專爲末學道淺者言以其道淺是以仙品未充運當滅度之際身脩仙道未備體未純陽必經太陰之所考掠太陰猶北陰泉曲也臨過之時遇其將過盡之時同學至人爲其行香誦經十過同學者或同師同道所學已至之人當爲行香誦經一遵十回之式以度尸形如法假其已鍊之眞陽脩誦是經以度其尸形之至陰送其魂神上生南宫尸者魄之未化形者氣之未化必資經功道力鍊質陶魂庶可徑上南宫也隨其學功計日而得更生各隨其學業之淺深功德之高下而後計日之期限隨品受生轉輪不能滅其本性一靈不昧久之玄功積習之至亦得仙道矣道言夫天地運終亦當脩齋行香誦經星宿錯度日月失昏亦當脩齋行香誦經四時失度陰陽不調亦當脩齋行香誦經國主有灾兵革四興亦當脩齋行香誦經疫毒流行兆民死傷亦當脩齋行香誦經師友命過亦當脩齋行香誦經夫齋戒誦經功德甚重上消天灾保鎮帝王下禳毒害以度兆民生死受賴其福難勝故曰无量普度天人青元曰道君此章明此經非惟度己雖天地君臣民物皆當兼濟方爲道備乃顯度人之普也夫天地運終以皇極元會運世論之天地亦有成壞始終皆不能逃乎運數易曰天地毀無以見易是也人身與造化同徒故可以參天地贊化育裁成其道輔相其宜也先儒不曰天人一致之功以其心與理一而已夫以主宰謂之帝妙用謂之鬼神豈非一致哉故當運有否終亦必脩齋誦經以禳之星宿錯度謂躔度乖錯晷刻訛謬日月失昏謂盈虧薄蝕此亦囿於遲留伏逆之數也亦必脩齋誦經以禳之四時失度謂寒暑不常陰陽不調謂旱潦爲虐皆愆於天地之至和而然也亦必脩齋誦經以禳之國主有灾兵革四興凡灾異兵革莫非陰陽悖逆政化乘違而致其脩德政省刑罰撫黎庶治師旅任賢能安社稷皆所以消天變而息人殃也此聖君賢臣之所首務然苟有是灾亦當脩齋誦經以禳禬之蓋以請命於天而天必弭灾以降祥也疫毒流行兆民死傷疫毒者疫癘之炁流毒於兆民必見死傷亦當脩齊誦經以禳釋之使其炁候正則疫炁息矣師友命過師所以傳道授業友所以輔仁益德居綱常之一也當其命過之時亦當脩齊誦經以拔度之既言師友則於其親槩可知所自矣夫齋戒誦經功德甚重此道君重讚是經之功德也内則虚心鍊炁順神葆眞外則其功可以上消天灾保鎮帝王下禳毒害以度兆民可謂君臣民物無所不被其澤其功无量天人普度矣道言凡有是經能爲天地帝主兆民行是功德有灾之日發心脩齋燒香誦經十過皆諸天記名萬神侍衛右别至人尅得爲聖君金闕之臣諸天記人功過毫分無失天中魔王亦保舉爾身得道者乃當洞明至言也默菴曰此道君再言學士脩誦之功用此段復總前篇而言皆道君垂訓之切也凡遇有灾之日能爲天地日月帝主兆民燒香誦經行是功德則諸天記名於仙籍萬神侍衛於左右皆經功所積而至也右别至人學力已至之人登證仙品頃刻臣事三境神遊金闕矣諸天記人功過毫分無失天中魔王亦保舉爾身者此重復告戒之至務令學者之功勤也諸天各有司察紀録之官曹功過之細微無分毫髮必録有功則升仙品有過則付罪簿必無私失矣能依經功脩持者天中魔王亦保舉其身紀名諸天矣得道者由經而悟道乃當洞明至眞之言以究至玄之道也内而求之即神居泥丸温養之道是也元始無量度人上品妙經通義卷之三
