front:
  text: 元始無量度人上品妙經通義卷之二來五
  hash: sha256:efa3da36cc2c24ec08cffa12f0dd122ef69283fe10af56e17d4be11ed190bb18
  markers:
  - {type: page-break, offset: 0, content: '', id: KR5a0089_HFL_002-001a, image: hfl/0042/0042-004.png}
body:
  text: 正一嗣教道合无為闡祖光範真人領道教事四十三代天師張宇初註元始無量度人上品妙經此正經之題也正經乃元始所説故止題曰元始无量度人上品妙經此乃道君標經首曰元始以明此經爲元始天尊所説无量度人總一經之本旨此經居品秩之首故曰上品妙經也元始洞玄靈寳本章元始一炁之元萬化之始是爲虚皇天尊應化之號本章冠以元始二字明皆元始天尊之言也洞玄居三洞之一經品之名也靈寳乃道君之號道君名經寳以諸經皆由道君演説也道寳經寳師寳在天地之先皆由玄元始三炁化生故是經亦由梵清景三炁結爲雲篆天章然後天眞皇人按筆乃書而成經文元始居於空洞虚玄之中說此經是爲靈寳諸經之本居諸經之首故曰本章内而修之即金液大丹之異名也凝神爲靈聚炁爲寳則根塵洞徹我之元神亘古今而不壞是爲先天眞一之本也上品妙首十迴度人百魔隱韻離合自然默菴曰此正經之小序也上品妙首經品之上衆妙之首十迴度人十乃五行生成之數萬物皆具此理度人度鬼必周迴十過終而復始而後十轉回靈也百魔隱韻少微曰魔非妖魔魔鬼之魔如五帝大魔南極長生度世司馬等神是也故靈寳呪中眞王朱陵青華皆與五天大魔並列也隱韻即隱名隱諱之類也離合自然以隱韻之音一離一合自然而然而無常跡也蓋先天一炁化生萬彙一本而萬殊合也萬殊而一本離也周回無窮循環無端不能窺造化之跡也丹道以十月胎圓而後神化與天地同途造化同機莫不以十爲全數人之脩鍊所難者身中六根八識三魂七魄三部八景之神動爲魔試汩亂心君其離合紛擾不能少息既知脩鍊十回之功則百魔受制而歸於自然矣混洞赤文无无上眞元始祖劫化生諸天開明三景是爲天根上无復祖惟道爲身少微曰自然以前是道君小序混洞以後是天尊本章混者混然未分洞者空而無質即混沌未分之先一炁胚渾於空洞之中也赤文者赤書眞文經曰洞陽炁赤故號赤書是也皆先天之炁至陽之精兆而成象也五老上帝云元始洞玄靈寳赤書生於元始之先空洞之中幽幽冥冥无祖无宗結炁浮空乘機應會者此也无无上眞一炁肇於太无之始經曰无无亦无是也无上之最上真中之至真所謂先天地生也祖祖炁也劫者天地一成一敗爲一劫祖劫乃天地世界初生之始未經敗壞也玄元始炁爲萬物之祖造化五億諸天皆由祖炁化生而有經曰道爲萬物母是也蕭觀復曰自一炁而立三境由三境而生九天三境之下各生三天合有三十六天次下四種民天次分三界二十八天次八梵天以至化生五億諸天皆由祖炁爲之本根也開明三景三境者清微禹餘大赤三天也三景又曰日月星三光也天地人三極三才三界也太上曰道生一即一炁也一生二即兩儀也三生萬物即三景也三炁合生為九炁三炁乃天地之宗萬物之根皆由祖劫化生而後開明天地由之以生是爲天根也上无復祖惟道爲身道以虚无爲宗不可以象求是曰强名故无形无名无聲无臭大包天地囊括宇宙其上它无所祖者道也儒曰无極釋曰眞空道曰太虚其理一也人之修鍊采祖炁於先天之初結爲金母周流六虚皆二炁絪緼開闔而不息久之追二炁於黄道會三性於元宫則二五之精妙合而凝生生無窮而成法身即元始之天根也五文開廓普植神靈无文不光无文不明无文不立无文不成无文不度无文不生是爲大梵天中之天五文者五篇眞文也即五篇敷落之文生天立地飛潜動植蠢動含靈凡有形氣之物皆由之以生化故自陰陽分判以來其文開廓普植萬類五文在天爲五星在地爲五嶽在人爲五行在物爲五炁至大至微之物莫不囿於其中故一無是文則不光不明不立不成不度不生而天地萬物皆無所運於造化之機矣人身一小天地其靈於萬物也先天一炁爲之丹基五行布列於鼎器之中金木交並水火合姤二土爲圭於中顛倒陰陽既濟之後情歸性則汞投於鉛藥得火則砂産於銀莫非金母爲根流戊就已見土而成丹丹成則其神靈妙化不可窺測皆五行之全體也其光明猶日月之明其立猶天地之成立能度能生者即元始也是爲大梵天中之天結前經文之旨故曰是爲也大梵即大行梵炁也天中之天三十二天中之天莫非梵炁流行周回不息猶身之一炁循環皆天命流行百脉九竅無往不復即梵炁之周布也鬱羅蕭臺玉山上京上極无上大羅玉清渺渺劫仞若亡若存大羅天之上有玉京山以玉爲京故曰玉山上京鬱羅之臺又居玉京之上窮高極遠无上之上也是爲大羅之天玉清金闕居於其中其大無際包羅萬界故渺渺劫仞不可窮極而梵炁結空本非色象可求是曰若亡若存凡天地一成一壞爲一劫大羅之境兆於曠劫之先歷劫而不壞仞者不可以限量測也其渺漠恍惚與太虚同體无形无名非可以跡求也鬱羅蕭臺在身則腦際也玉山上京者泥丸也泥丸爲天門乃萬神之府是爲大羅之景玉清居其中渺渺劫仞若亡若存己之眞性渺漠無眹恍惚中之有物歷浩劫以長存所謂不壞之元神故居於三界之上矣三華離便大有妙庭金闕玉房森羅浄泓大行梵炁周迴十方幽棲曰三華玉清三元宫也上元玉華中元金華下元九華三元上皇道君居之乃玉清之離宫便殿大有即高上大有玉清宫天尊所御故曰妙庭三者南方之火數屬離即泥丸腦際也金闕玉房即黄庭絳宫也森羅者周天星宿也浄泓者二池之瑩徹即身中之坎離也大行梵炁周迴十方者大羅玉清之景梵炁流行周布十方无極之界萬彙皆沾元始一炁化生無窮矣丹經曰三宫混合會三性於元宫身之神炁精即三華也元神居於靈臺之中即大有妙庭也我之金樓玉室即天之金闕玉房也五星列宿森羅煥耀於浄泓池水之中即周天火候列宿衆星環繞於坎離水火昇降之内乾坤鼎器既濟之間則九還金液之道成矣先天眞一之炁晝夜循環周而復始皆禀坎戊月精離己日光符火進退交姤温養而成金胎循歷六十四卦既周則百脉歸元九竅洞明豈非梵炁周流十方俱徧皆爲浄泓之景矣中有度人不死之神中有南極長生之君中有度世司馬大神中有好生韓君丈人中有南上司命司録延壽益筭度厄尊神迴骸起死无量度人今日校録諸天臨軒默菴曰此言諸天齊集考校學士功過世人罪福仙師曰梵炁周迴於十方之域而十方之中有神主司度世不死之事非言神不死也南極長生君即南極長生大君主治生録也又曰即朱陵大帝度世司馬大神即南宫有司馬大神主司度世好生韓君丈人治南昌上宫監長生之籍南上司命司録延壽益筭度厄尊神南上有洞陽宫之别名又曰即南昌上宫朱陵火府尊神即南斗六司眞君自中有度人至南極諸真雖各隸一司皆能迴骸起死劫劫度人是以度世无量也身中之神各居絳宫玄關泥丸之内故曰中有所謂南極南昌皆心也經曰无量大神皆由我身是也脩真之士金液鍊形而後形神俱妙周迴十方皆可度世度厄迴骸起死矣今日校録今日者赤明劫初在大浮黎土開圖校録之日乃校量罪福紀録功過而諸天神王大聖皆臨軒而會以聽天尊宣演受度也東方无極飛天神王長生大聖无量度人總南方无極飛天神王長生大聖无量度人飛西方无極飛天神王長生大聖无量度人雲北方无極飛天神王長生大聖无量度人无鏡東北无極飛天神王長生大聖无量度人梵東南无極飛天神王長生大聖无量度人那育西南无極飛天神王長生大聖无量度人度仙西北无極飛天神王長生大聖无量度人钁无上方无極飛天神王長生大聖无量度人瑛下方无極飛天神王長生大聖无量度人落十方飛天大聖皆元始道炁分形化炁冰湖薛秀昭曰十方長生大聖即十方救苦天尊自開圖校録奉元始命掌十方三界校録功德開度无量總括生死陶鑄學人道藏云八方諸天皆有无極大千世界東方无極諸天安大堂鄉大千納善世界南方无極諸天宛黎城境大千棄賢世界西方无極諸天福堂洲大千咸行世界北方无極諸天鬱單野大千清浄世界東北无極諸天福集都大千長安世界東南无極諸天元福田大千用賢世界西南无極諸天延福鄉大千仁静世界西北无極諸天福德野大千延賢世界上方上清玉眞三十六天玄都无極世界下方黄曾三十二天八圓无極世界又曰五嶽五帝洞陰清靈北都羅酆諸宫府之衆此十方无極飛天神王皆主長生度世之職故曰長生大聖從劫至劫度人得道成眞無有限量是曰无量度人十方至眞飛天神王長生度世无量大神並乘飛雲丹輿緑輦羽蓋瓊輪驂駕朱鳳五色玄龍建九色之節十絶靈旛前嘯九鳳齊唱後吹八鸞同鳴獅子白鶴嘯歌邕邕此總前十方飛天神王无量大神皆天至眞也青元曰輿輩輪蓋皆陽精之炁所成鳳龍獅鶴乃陰精之炁所化上聖具眞常之道呼吸合散隨意現前陰陽之炁調和成歌成曲皆炁所爲並非外物也凡脩還丹功成陰魔亦化陽神元炁一呼萬神咸聽五臟神靈各隨方色自現輿輦儀衛來迎百骸衆神前導後從昇舉朝元與天眞大聖之會無異也五老啓途羣仙翼轅億乘萬騎浮空而來傾光迴駕監眞度生十方大聖道位尊隆乃感五帝前導群仙驂乘是以億乘萬騎浮空駕景而至矣五老者東方青靈始老姓關諱開字靈威仰南方丹靈眞老姓洞浮諱極炎字赤熛弩中央元靈元老姓通班諱元氏字含樞紐西方皓靈皇老姓上金諱昌開字耀魄寳北方五靈玄老姓黑節諱靈會字隱侯局五帝皆天眞自然之神由祖炁妙化而爲五行即五炁也故曰元始五老非積學而成眞者自受命降符各鎮一方大劫交周其位乃易故東方屬木主春令生萬物南方屬火主夏令長萬物中央屬土旺於四季和萬物西方屬金主秋令成萬物北方屬水主冬令藏萬物所謂五炁順布也五行乃法身之正炁火龍水虎顛倒流布於鼎器之中萬神攢簇於九宫則五炁朝元百靈衛體是猶千乘萬騎浮空而來也傾光者流精玉光也迴駕者飛雲丹霄也十方大聖朝集帝所輪轂迴旋天尊之法座以監領衆眞校度群品也在内則迴己之眞光洞照靈府則坎離既濟鉛汞相投神不外馳六轡俱息而後陽光下傾陰滓上瑩眞神化生自能監眞度生周迴十方矣諸天丞相南昌上宫韓司主録監生大神執籙把籍齊到帝前隨所應度嚴校諸天默菴曰此言諸天齊集考校學士功過世人罪福諸天丞相即大羅無極神公南昌上宫即朱陵火府在赤明和陽天也韓司者即可韓丈人主鍊度文籍之事監生大神主度魂受生之職録籍者紀學士世人功過罪福也各司掌隸之神齎持籙籍齊會天尊之前校功量福普度人天校其應受度者或宿名玄圖骨相合仙或脩齋奉戒功德積感或敬奉三寳善功徹天或供養師寳爲三官所稱紀名諸天者嚴校籙籍據功量品隨其高下應受升度矣觀復曰此以上正文玉晨道君序述普造三界无極神鄉泉曲之府北都羅酆三官九署十二河源三界者欲界色界無色界也无極神鄉者十方无極世界也泉曲之府九幽長夜之府也北都羅酆者下元正北有一大海穢氣惡腥莫測邊際中有一山上參碧落下入風泉皆黑鬱之氣盤結而成名曰北都羅酆山有大洞曰陰景天宫中有三十六獄太陰天君主之内有六洞六天大魔王各主一司其一曰紂絶陰天宫其二曰泰殺諒事宗天宫其三曰明晨耐犯武城天宫其四曰恬照罪氣天宫其五曰宗靈七非天宫其六曰敢司連宛屢天宫人能持此六洞之名常生敬畏則魔王保舉削落罪名生死受賴獲福無窮矣三官九署者天地水三官治三元考校之司上元天官隸玉清境設三宫九府三十六曹中元地官隸上清境設三宫九府四十二曹下元水官隸太清境設三宫九府四十二曹其中元下元官僚皆死而有功德之魂受度得任各依年限功滿進昇天府功未滿者還生人中九署者又曰乃九壘土皇九令之司十二河源者月爲太陰之精諸水之母東井爲天河之源衆水所會太陰一月一周天故十二月皆過東井沃黄華之甘露以濯鍊之死魂亦資此蕩形而後度品南宫矣人身心為南昌即朱陵府也經曰靈寳无量光洞照炎池煩心虚則神光洞照腎部之下皆爲幽陰泉曲之府即北都羅酆也以我眞光朗徹明燭幽暗運太陰之眞水於東井蕩滌幽魂而後濟以太陽南離之眞火以煅鍊之雖无極神鄉之魂爽皆普告而度矣上解祖考億劫種親疾除罪簿落滅惡根不得拘留逼合鬼羣人之祖考凡子孫不能脩善積德必殃及九祖皆至淪墜無有出期能知脩崇經教遷善布福然後上解祖考之罪障以及種親之遠亦皆獲度矣觀復曰每三官校録子孫有大功玉帝敕命即超度九玄七祖一身受度則九祖蒙恩故今疾除罪簿而惡根亦隨落滅矣惡根者惡念根性罪簿者冥司所録輕重罪籍蒙慈恩開度大宥其業則惡根盡滅名籍除落雖冥曹亦不得拘留逼合鬼羣凡億劫之親皆乘普度矣能知脩鍊之士不爲華競所撓嗜慾所昏體性湛然圓通明妙則三尸六賊不能汩亂穢濁修鍊乆之萬炁朝生門百神守死户不致沉滯苦趣億曾萬祖咸遂昇遷矣元始符命時刻升遷北都寒池部衛形魂制魔保舉度品南宫死魂受鍊仙化成人生身受度劫劫長存隨劫輪轉與天齊年永度三途五苦八難超凌三界逍遥上清默菴曰此言學士祖考受鍊自身受度也元始符命若靈寳法中之生天寳籙救苦九龍符命諸眞符簡皆元始天尊降敕頒命九霄九司敕下三界十方而行是以時刻即可升遷北都寒池即羅酆泉曲也部衛形魂者人死則形離魂散北帝承敕部衛亡魂不致散亂制誥魔王保舉則度品朱陵南宫受鍊死魂處於幽暗極陰之府承天尊慈光一燭眞陽内鍊則幽暗覩明而陰浄陽純仙化成人矣其能脩經教滌鍊形神則生身受度劫劫不失人身而眞性長存矣隨劫輪轉與天齊年者劫數終有敗壞凡囿於形氣者厥有輪轉惟得仙之士一靈妙本曠劫不壞與天地齊其長乆永度三途五苦八難者三途第一色慾門上尸道天塗界第二愛慾門中尸道人塗界第三貪慾門下尸道地塗界又名三惡善遏人學仙之路五苦者色累苦心愛累苦神貪累苦形華競苦精身累苦魂五苦三途故曰八難也人能知歸根復命之道攝情還性舍妄歸眞則三業六根俱已浄絶一眞獨露萬幻皆空運元始祖炁於坎離旣濟之中陶魂鑄魄斬地根而證天根是以死魂受鍊生身受度三界不能拘攝頓超無漏逍遥上清之境矣上清之天天帝玉眞无色之境梵行幽棲曰上清之天其三十六天帝最尊極也道齊元始位列玉清故曰玉真即上清以下三十六天不同三十二天也有景無色故曰梵行梵行者道中之道天中之天出入無間眞空无礙也又龍蹻經云上清十二天九眞所居天帝玉眞天中之帝體涵瑩玉氣御至眞以其脩鍊純粹故曰玉真蓋上文言逍遥上清此特釋上清之天天帝居於无色之境之上精脩梵行以證道成眞也東方八天默菴曰此三十二天之序引俗本於此添元始靈書上篇道君撰九字不可從自黄曾天至七曜天元始積九陽梵炁以成六天爲欲界二天爲色界天欲界有六天即下界也此天之人有形有欲觸物染著六欲根浄即登色界太皇黄曾天帝鬱繿玉明正音開玄攝明天帝内諱鬱艦帝魔隱音玉明太明玉完天帝須阿那田正音保玄道靈天王内文須阿隱音那田清明何童天帝元育齊京正音明生九眞天王隱諱元育眞人内文齊京玄胎平育天帝劉度内鮮正音飄翰默然天帝隱名劉度内鮮元明文舉天帝醜法輪正音開生舒天帝内文醜異號法輪上明七曜摩夷天帝恬懀延正音延虚明天帝内音恬懀隱號延虛无越衡天帝正定光正音鏡無翹天帝内文正定光太極濛翳天帝曲育九昌正音阿難浄明天王隱號曲育總文九昌南方八天元始積三陽梵炁以成八天屬色界四天爲麄塵四天爲細塵赤明和陽天帝理禁上眞正音治安保仙天王隱號理禁上眞玄明恭華天帝空謡醜音正音飛音洞靈天帝内文空謡醜音曜明宗飄天帝重光明正音翹眞英天帝總號重光明竺落皇笳天帝摩夷妙辯正音難玄明天帝隱諱摩夷内音妙辯虛明堂耀天帝阿𨚧婁生正音彌綸玄明天帝隱音阿𨚧梵號婁生觀明端靖天帝鬱密羅千正音朗觀耀明天帝隱文鬱密内號羅千玄明恭慶天帝龍羅菩提正音威清道玄飛天内音龍羅帝君隱號菩提太煥極瑶天帝宛黎无延正音洞真永觀天王内文宛黎无延西方八天自越衡天至曇誓天元始積七陽梵炁以成二天爲色界六細塵六輕塵色界有十八天即中界也此天之人有形無欲而有六色十八塵六塵俱浄升入无色界元載孔昇天帝開眞定光正音開光竟眞帝君内音開隱諱眞定光太安皇崖天帝婆婁阿貪正音暉莫阿魂天君隱音婆婁帝魔内諱阿貪顯定極風天帝招眞童正音回翹威天君祕號招眞童始皇孝芒天帝薩羅婁王正音君華大權玉眞隱文薩羅婁王太皇翁重浮容天帝閔巴狂正音惠威光帝君内文閔巴狂无思江由天帝明梵光正音朗明法元帝君内號明梵光上揲阮樂天帝勃勃監止音鬱元眞星天帝内文勃勃内號監无極曇誓天帝飄弩穹隆正音飛天虛英天魔内文飄弩天君隱諱穹隆北方八天自皓庭天至秀樂天元始積五陽梵炁以成四天爲无色界四天爲種民即上界也至眞無情人民化生色欲俱空脩至此天皓庭霄度天帝慧覺昏正音元清明帝君内音慧覺昏淵通元洞天帝梵行觀生正音法權道光天君内音梵行隱諱觀生太文翰寵妙成天帝那育醜音正音靈熏惠光帝魔内文那育醜音太素秀樂禁上天帝龍羅覺長正音陽威耀清天帝内文龍羅覺長太虚无上常融天帝總監鬼神正音攝靈眞天帝攝魔内音總監鬼神太釋玉隆騰勝天帝眇眇行元正音空微道明帝君隱號眇眇行元龍變梵度天帝運上玄玄正音掬靈妙光天王内文運上玉眞總音玄玄太極平育賈奕天帝大擇法門正音永玄久生天王總文大擇法門已上正文皆元始天尊所説觀復曰此諸天玉諱玉音皆以赤晶之玉碧字刻之祕於上清天中自皇曾天至禁上天是爲三界即欲界色界无色界欲界六天自皇曾天至七曜天此天之人有形有欲觸物染著初上二天以身爲欲其二天接手爲欲其五天以口説爲欲其六天以眼視爲欲以有色欲交接陰陽故名欲界因其欲樂易至衰敗壽命終盡復淪諸趣能知脩習六欲根浄則登色界即中界也色界十八天自越衡天至曇誓天此天之人有六色十八塵曰六麄塵六細塵六輕塵一塵浄升一天十八塵浄升无色界即上界也无色界四天自皓庭天至秀樂天也太乙眞科曰无色界中至眞無情不交陰陽人之化生但噉眞炁无復形質脩至第一天惟存心識以入炁觀若心識除次第而升若結習俱忘不著有無洞入自然升種民天如大劫交水火不到惟風浩蕩孝芒天至靈度六天爲風所壞元洞天至秀樂天元炁散而復合更無劫數穢常融天至平育天爲四種民天洞入眞道故本際經云結習巳盡超種民天位太乙眞科曰上升四天洞入道境隨炁升降灾所不及薛幽樓曰四方之天三十二者四梵天也天帝高眞形相宛然雖有眞相猶如虛空出入無間矣蓋四方各八天皆積梵炁而成各天帝尊內名隠諱亦皆梵炁結空而有象天尊宣說以度世此所以設經教之無窮而生死受賴矣三十二天三十二帝諸天隠諱諸天隠名天中空洞自然靈章諸天隠韻天中之音天中之尊天中之神天中大魔天中之靈九和十合變化上清无量之奥深不可詳敷落神眞普度天人默菴曰此言天帝名諱乃天中空洞之炁自然結成之妙也三十二天中則有三十二帝諸天之隠諱隠名隠韻皆梵炁結空而成即生神章所謂混合空洞炁也故曰自然靈章天中之音即隱韻之遺響也天中之尊即三十二帝也天中之神靈則皆梵炁之功用神妙莫測也大魔則五天魔王也九和十合者九者陽數之成十者陰數之終此陰陽之功用也以其全陰陽之妙用是以變化無窮而徑達上清之境矣上清者輕清之炁屬乎天象乾爲六陽之極九和也坤爲六陰之極十合也大丹火符之妙盡於是矣无量之奥深不可詳此皆隱諱隱韻之不可得而盡述也敷落神眞者即五篇敷落之義也神眞者所謂天中之神也靈章奥範敷闡廓落於空洞之中是以普度天人生死蒙惠矣或以此爲玉晨道君序述元始所説此皆正經之要目豈乃中斷而復續也今日欣慶受度歷關諸天請滅三惡斬絶地根飛度五户名列太玄魔王監舉無拘天門今日者謂元始以經付道君之日也道君乃欣慶受度歷關諸天天尊於說經之日諸天齊臨是乃關告諸天使爲愛度天人滅三惡斬地根度五户而後名列太玄矣三惡者即三塗也地根者即地獄中之根性也五户者即五苦也天人受度經法之後三惡五户皆已削滅則地獄之根性亦皆斬絶矣是以名列於玄都玉京之上三界大魔王皆爲保舉上升天門無復有拘制矣人能知脩經教内明十回大丹之道三業六根俱已清浄則苦輪罪蔕皆一空寂金母既萌聖胎圓就眞炁流行於諸天之内陽神脱體三界混融雖大勳魔王亦皆舉手讚奉上升天門無有拘束又何地根之未絶也此非積功累行之至則不能至動爲外魔所障地根且不能絶況能超入天門也哉學者可不慎歟東斗主筭西斗記名北斗落死南斗上生中斗大魁總監衆靈東斗五星西斗四星北斗七星南斗六星中斗三星或以東南西北七宿爲四方之斗以北斗爲中斗蓋天官書曰斗爲帝車運於中央臨制四方以察妖祥又眞一口訣云斗中自有五斗陽明爲東斗陰精爲西斗丹元爲南斗北極爲北斗天關爲中斗法中謂天以斗爲心故曰天罡所指晝夜常輪中斗大魁即魁星也則北斗謂之天樞宜居中也爲萬靈之主宰是以總監衆靈也人以心爲斗心之七竅象斗數也心居一身之中爲五官之主宰神明之宅舍也天人學士受度之後則四斗爲之註筭記名落死上生中斗則總統於中萬靈護體脩丹之士周天火符皆由天罡内運循歷二十八宿七十二候陽火陰符既濟而後丹成道備矣青帝護魂白帝侍魄赤帝養氣黑帝通血黄帝中主萬神無越默菴曰此言對待之體其應河圖蓋三五之妙生成之體也五帝在天爲五行在地爲五嶽在人為五臟之神青帝姓常諱精明護魂治肝白帝姓混諱蓐收侍魄治肺赤帝姓炎諱洞丹養氣治心黑帝姓玄諱明萌通血治腎黄帝姓麻諱忠慎中主黄宫制御萬神大洞五帝籙云五帝與天地同存陰陽始判化生五行靈寳法中紅杏磨針襪臘墨黑靈寳爲五帝也肝護魂拘三魂也肺侍魄制七魄也心主養氣腎主藏精水火相資則二炁交姤得度之士則受鍊更生五帝降氣化生五臟以成五行而後度品南宫即五臟結胎嬰也脩丹之士得攢簇五行顛倒之術一炁周流於中黄之宫萬神混合於九竅之内五帝降神而鍊金液降炁以結胎嬰久之五炁朝元擒鉛制汞歸于眞土而丹成仙師曰精神魂魄意化作紫金霜是也青天魔王巴元醜伯赤天魔王負天擔石白天魔王反山六目黑天魔王監醜朗馥黄天魔王横天擔力五帝大魔萬神之宗飛行鼓從總領鬼兵麾幢鼓節遊觀太空自號赫奕諸天齊功上天度人嚴攝北酆神公受命普掃不祥八威吐毒猛馬四張天丁前驅大帥仗旛擲火萬里流鈴八衝敢有干試拒遏上眞金鉞前戮巨天後刑屠割鬼爽風火無停千千截首萬萬剪形魔無干犯鬼無妖精三官北酆明檢鬼營不得容隱金馬驛程普吿無窮萬神咸聽三界五帝列言上清默菴曰此言流行之用其應洛書九一之數五天魔王上四言位號中二言諱下二言字又青天魔王姓斌諱齒成赤天魔王姓佛名由肅白天魔王姓赤名張市黑天魔王姓徐名直事黄天魔王姓天門名波狂皆主人貪欲耗摇神氣障敗道緣故曰魔王五帝大魔即五天之下魔王也居萬神之首是曰宗也即人身五官也玉清隱書云五帝魔王領官屬與天同生常惱亂學道之士不欲成功又自矜於諸天上帝齊其聖功後因龍漢開圖乃服元始之化故歩虚頌曰魔王敬受事故能朝諸天此言魔王作歌以敗亂學者自服元始之化而後專職魔試而已飛行鼓從總領鬼兵言其飛行三界鼓率部領鬼兵侍從也麾幢鼓節自號赫奕言其麾揚旛幢鼓舞旌節遊觀乎太空之上自號赫奕之功與諸天齊也上天度人嚴攝北酆者即北都羅酆也上天開度人之功先嚴戒北酆鬼官不得遏筭絶命承天尊開度順化而行敕攝鬼帝普告冥關宣約示禁則無輒肆害於末學矣神公受命普掃不祥者幽棲曰神公者大羅无極神公也神公受敕命五帝大魔掃除不祥護衛學者大魔承命以八威神龍吐毒而收邪猛馬駕車而四布天丁秉命前驅大帥仗幡後從火鈴大將擲火萬里火燄八衝敢有干試拒遏上眞者敢有拒遏上帝之敕命者也前則金鉞行戮後則巨天之斧施刑屠割鬼精妖爽之干試如風火之疾不暫停也神威所至千千截首萬萬剪形皆不留蹤矣以至魔試無所干犯鬼魂滅其妖精學者至是則功圓道備内外一如三官北酆明檢鬼營不得容隱金馬驛程三官九府北都羅酆皆考校世人幽明罪福善惡之司明檢鬼營罪録黑籍應有學士宿業重殃先亡祖禰未蒙原宥者不得容隱停滯咸與蠲除驛馬呈上而逍遥上清矣普告無窮萬神咸聽徧告十方三界咸使知聞悉遵天尊命令三界五帝諸天大魔列言保舉馳奏上清矣默菴曰此言受度之人天門不得拘阻魔鬼不得干試是也元始無量度人上品妙經通義卷之二
