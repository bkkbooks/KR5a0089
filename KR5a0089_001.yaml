body:
  text: 元始無量度人上品妙經通義卷之一來四太極妙化神靈混洞赤文之圖太上洞玄靈寶無量度人上品妙經正一嗣教道合無為闡祖光範真人領道教事四十三代天師張字初注太者大也上者尊也無上之上是為極尊洞玄者品秩之稱經有三洞洞真元始主之洞玄靈寶主之洞神道德主之此經本元始所宣而道君紀録故標洞玄靈寶而正經止云元始無量度人上品妙經所以别前後序道言乃道君之言也合而命曰太上洞玄靈寶以由道君承元始之旨無量度人即一卷之目三洞之中三十六部此經為首故曰上品妙者至精至微玄奧難極也經者徑也日用修真共由之道也內而修之曰丹即先天真一之祖氣也上無復祖惟道至尊洞者空洞明徹玄者湛寂幽微靈乃真性長存寶乃元命流行能修之於身則能度人所度無窮非可限量也夫證上乘之道不離乎自心此心即道即經是以虛靈無礙而度人無量矣道言昔於始青天中碧落空歌大浮黎土受元始度人無量上品道言者太上玉晨道君之言也此前序之題乃道君述昔受經始末紀載成篇之因始青者東方九氣青天也乃神霄九天之一此天梵氣所凝碧霞廓落故曰碧落碧霞之氣凝為瓊林瑶樹靈風鼓蕩自成空洞之歌是曰空歌大浮黎土即東極國名道君謂我昔於始青天浮黎土受元始天尊妙經廣度天人是為無量上品夫土中宫也玄關也其數居五為天地萬物之祖故百昌生乎土終乎土此吾玄關即寶珠也元神即元始也萬有生化無窮皆由乎是也始青木之象也火龍也震數三乾初索而生長男猶春居四序之首萬物以之而發生也然一初生水水生木二乃生火火由木生此五行循環生生無窮之理可謂著矣元始天尊當説是經周回十過以召十方始當詣座元猶乾元坤元也先乎天地而天地由之以生是為萬化之始萬彙之祖乃虛皇天尊之應號是為諸天之尊也當是時演説度人經教周行十過以召十方上聖高尊大會黍珠之中敷揚妙藴始乃就座而説經夫元始即法身之祖氣也元神也所謂不壞真空本來自性也當説是經即祖氣真丹之體元神不昧則天命流行而不息周流六虛動靜無端往來不已是乃周回十過十過者生數五成數五十乃天地之成數也修丹以十月而後成功十方者乃一三五七九陽也二四六八十陰也此為還丹之妙用而玄關之中真陰真陽之氣既濟則一身百脈輻湊川流猶十方真聖不召而集矣天真大神上聖高真妙行真人無鞅數衆乘空而來飛雲丹霄緑輿瓊輪羽蓋垂蔭流精玉光五色鬱勃洞煥太空凡無鞅數衆之真仙乃五億諸天日月星宿天真地只天地水府三界十方仙真聖衆不可以數度之一時皆乘空而來御空躡梵不行而至飛雲丹霄駕三素之雲乘絳霞之氣輪輿羽蓋皆真聖一時之神化百態萬狀靈變莫測流精玉光五色鬱勃流晶三光之輝交映玉光仙真之圓象洞明是以五彩交烜於太空煥明洞徹內而修之金母既返神室則以神攝氣以氣鍊神鉛汞擒制陰陽攢族是即千真萬聖之來會也須臾金火交輝於神室內外朗徹流精炫彩五色煥爛於太空矣七日七夜諸天日月星宿璇璣玉衡一時停輪神風靜默山海藏雲天無浮翳四氣朗清一國地土山川林木緬平一等無復高下上皆作碧玉無有異色七乃火數即七返之義也易曰七日來復凡數遇七必復先儒曰陽生於子陰生於午自午至子七而必復乾坤消息之理也以一日言之自午時至夜半復子時以一年言之自五月一陰生至十一月復子月以一月言之自午日凡七日復遇子日此天道運行之定數也諸天即三十二天也日月星宿璇璣玉衡者周天星辰與中斗七星也一時停輪者天體渾淪運轉周流無一刻之息至是時乃停輪息轉即復歸其根中行獨復也以其靜而來復息不出入是以神風靜默情慮頓消氣無上下猶山川之大雲霧俱藏天之浮翳亦除則四氣朗徹一國地土即浮黎土也山川林木緬平一等無復高下當説經之際神凝目定脈住心停性復情冥萬機俱泯則皆緬平一等自性如玉之瑩了無異色矣學者能忘形絶慮萬有皆空體性湛然一真獨露則一身之景象百脈皆停真鉛現彩是謂土皆作碧玉矣玄師曰此乃大定神光湛然見玉清之境是也衆真侍座元始尊玄坐空浮五色獅子之上元始者元神也玄坐者神室也故空浮去地五丈不著於物相也五色者妙化之氣也獅子者心知也衆真侍座左右元始法身玄坐空浮五氣朝於絳宫五色朗明即元神居於神室冥心攝氣三界混融心知明妙洞朗太無則五方之色交映中黃之宫矣説經一遍諸天大聖同時稱善是時一國男女聾病耳皆開聰説經二遍盲者目明説經三遍喑者能言説經四遍跛痾積逮皆能起行説經五遍久病痼疾一時復形説經六遍髮白返黑齒落更生説經七遍老者返壯少者皆強説經八遍婦人懷妊鳥獸含胎已生未生皆得生成説經九遍地藏發泄金玉露形説經十遍枯骨更生皆起成人是時一國是男是女莫不傾心皆受護度咸得長生金丹九轉之功以十月為胎圓神化河圖生成之數自一至十而生生無窮洛書變用除十縱橫一五一十此蓋天地五行不易之定數也萬物萬事豈能違哉故説經一遍者天一生水也水孕於乾金故子居母腹是曰空氣金胎也天地萬物皆由是而生蓋水為數之始諸天大聖同時稱善者諸天皆欣讚也能使一氣周流百神俱暢矣一國男女者猶一身陰陽之氣也其氣既舒聵者自聰且坎為耳一數既周聾者自疏通矣説經二偏者地二生火也火孕於巽木故母隱子胎是曰木火同位且離為目二數既周離明洞煥目無不明矣説經三遍者天三生木也震木孕於艮水且音屬金金本剋木而反寄胎金鄉是木絶於申而胎於酉此蓋木中藏金之象也金木受制則必嗚是以喑亦能言也説經四遍者地四生金也兊金孕於坤土故土能生金足本屬木而四遍乃跛痾起行金絶於寅而胎於卯是金嘗寄胎於木此明金中有木之象也説經五偏者天五生土也戊土孕氣於離火得天地之正流戊就已則二土成圭是以坎戊月精離已日光日月皆合璧矣人能知修鍊懲忿窒欲存心養性致鍊己之功而不息則太一含真玄珠成象與乾坤同體長生久視為不難矣尚何久病痼疾之為患哉人之困於疾厄者由不知返還之妙也説經六遍者地六成之也天一生水坎位於北陽中而有真陰是以乾金生坎水而成真鉛鉛乃金之母鉛黑而金白故謂髮白反黑齒落更生皆返本之應也説經七遍者天七成之也地二生火離位於南陰中而有真陽是以巽木生離火而成真汞即七返也離汞為金鉛所制則金火煅鍊乾金老陽也離火少陰也是乃老者返壯少者皆強矣説經八遍者地八成之也天三生木震位於東艮震合而成水汞感鉛氣而結為砂砂含汞質以象懷胎皆先天真一之氣凝合於規中發生萬彙晝夜循環長養聖胎非後天陰滓之氣所能育故曰婦人懷妊鳥獸含胎已生未生皆得生成也説經九遍者天九成之也地四生金兊位於西兊金合於坤土坎水隱於母胎即九還也故汞歸土釜而成寶乃一氣還源矣始由空氣金胎而生未見金質至此則金居性初還中宫而為丹體中即土也土為地是以地藏發泄金玉露形金母內居中宫也説經十遍者地十成之也天五生土土位于中土乃萬物生成之本天五之土陽土也地十之土陰土也兩土重而為圭故還丹謂之刀圭也金居其中是乾金反制離火於坤土之中所謂五行顛倒術也人能修之則返老還童超凡入聖故能起死回生若太上之治徐甲是也故曰枯骨更生皆起成人是時一國是男是女莫不傾心一國之中男女等衆一聞經教咸受護度而證長生之道矣國猶身也男女即陰陽二氣也傾心者陰陽以類相投也陰陽之氣沖和則太乙歸真生身受度死魂受鍊是謂長生矣道言是時元始天尊説經一遍東方無極無量品至真大神無鞅之衆浮空而至説經二遍南方無極無量品至真大神無鞅之衆浮空而至説經三遍西方無極無量品至真大神無鞅之衆浮空而至説經四遍北方無極無量品至真大神無鞅之衆浮空而至説經五遍東北無極無量品至真大神無鞅之衆浮空而至説經六遍東南無極無量品至真大神無鞅之衆浮空而至説經七遍西南無極無量品至真大神無鞅之衆浮空而至説經八遍西北無極無量品至真大神無鞅之衆浮空而至説經九遍上方無極無量品至真大神無鞅之衆浮空而至説經十遍下方無極無量品至真大神無鞅之衆浮空而至此道君序授經之始末也十回度人十轉回靈此經與序之本旨也天尊説經感召十方無極衆真無鞅之衆皆浮空而至東方梵監須延天等震宫卯位為無鞅之衆南方鬱單無量天等離宫午位為無鞅之衆西方靈化梵輔天等兊宫酉位為無鞅之衆北方洞元化應聲天等坎宫子位為無鞅之衆東北高虛清明天等艮宫寅位為無鞅之衆東南波羅尼密不驕樂天等巽宫巳位為無鞅之衆西南寂然兜術天等坤宫申位為無鞅之衆西北上上襌善無量壽天等乾宫亥位為無鞅之衆上方九霄上清玉真三十六天等為無鞅之衆下方無色界色界欲界三十二天等以至三元九地無鞅之衆俱會始青天中浮黎土內聞經聽法內而修之真鉛為藥祖玄關為丹基即元始説經也土居中宫自成十數中即玄關也十遍者乃天地生成之數十方者五行配合一三五七九天數二十有五陽精也二四六八十地數陰華也陽之生數五五行之本也陰之成數十萬化之根也一九四六合而為十乃金水同宗二八三七合而為十乃木火同體總之為五十有五分隸五方五行顛倒則龍從火出虎向水生火生於木則砂中抽汞乃七返朱砂返本水自金生則銀內制鉛乃九還金液還真易曰天地絪緼萬物媾醇是乃無量無極至真大神皆至也故丹基法象分三百八十四爻循環火候內運五星二十八宿環列鼎內促三千六百之正氣回七十二候之要津驅六十四卦之陰符鼓二十四氣之陽火則三魂衛形七魄歸體身中萬二千神一時聽命此所謂十轉回靈萬氣齊仙也十遍周竟十方無極天真大神一時同至一國男女傾心皈仰來者有如細雨密霧無鞅之衆迮國一半土皆偏陷非可禁止説經至十遍周竟十方天真大神一時皆會至男女無不皈仰是若細雨密霧之衆也迮國一半充滿國內之半而天尊威德崇重地不能載至乃偏陷而終莫能禁止之人身十轉之功既備乃念息神凝性還命復則真鉛歸室矣一身陰陽之氣混融薰蒸四體有如雨霧之潤澤周流六虛上下無常往來不息即無鞅之衆充滿盈塞雖至國迮土陷不可止也於是元始懸一寶珠大如黍米在空玄之中去地五丈辛君曰元始己之元神也寶珠即心也儒曰太極釋曰圓覺蓋一理也道亦曰玄珠心珠黍珠即是物也寶者至精至真之義即靈寶之謂也大如黍米以其大包宇宙細入毫芒所謂其大無外其小無內變化莫測是以在空玄之中不可以迹求也去地五丈者五乃土數得五行之中也猶五行生成之數虛中以象太極心虛則元神居之是為空玄之中矣豈非空氣金胎之謂乎故玄師曰此乃玉清寶珠神化仙胎之道按蕭觀復曰元始懸珠者神與道俱也向來説經獅子之上者乃神凝室中從無求有也今此懸珠空玄之中者乃超神物外出有入無也是矣此皆天尊顯示妙化之機以明其至精至微之中而有至妙之道存焉元始登引天真大神上聖高尊妙行真人十方無極至真大神無鞅數衆俱入寶珠之中天人仰看惟見勃勃從珠口中入既入珠口不知所在國人廓散地還平正無復欹陷天尊懸寶珠在空玄之中登引三元九聖五老九真天真大神無鞅之衆俱入珠中其天人仰看皆在空玄之中五明之內百億光中惟見勃勃從珠口中入即不見其為空玄之境也故不知所在國人亦皆廓散寂然不動則地亦平正不復欹陷矣其非天真上聖不能同入空玄之妙秪仰看而已其曰十方無極至真大神無鞅數衆者俱入矣豈非天人乎蓋己之心珠朗徹氣合神冥斂萬歸一即無鞅之衆皆入吾珠口矣則六根靜寂一真獨露又何欹陷之不平正也哉元始即於寶珠之內説經都竟衆真監度以授於我當此之時喜慶難言法事粗悉諸天復位倏欻之間寂無遣響元始於寶珠之內説經既畢衆真監侍乃授度於道君是時道君喜慶難言非可名喻無鞅之衆法事亦悉則諸天真皆還所治一國之內倏然恬靜寂然無遺響矣內而元神中居一氣混融九竅洞明金母攝制砂汞歸於鼎內行功至是欣悅難以言喻一刻之工已竟萬神還元惚恍冥寂寶珠之象亦無復歸於無極矣是時天人遇值經法普得濟度全其本年無有中傷傾土歸仰咸行善心不殺不害不嫉不妬不淫不盜不貪不欲不憎不嫉言無華綺口無惡聲齊同慈愛異骨成親國安民豐欣樂太平天尊説經既竟諸天復位之後一聞經法普得濟度皆全其天年而終無復中道夭傷矣且皆傾土歸仰經教頓行善心凡殺害嫉妬淫盜貪欲憎嫉華綺惡聲俱已淨盡是乃慈愛一體異骨成親則國亦安民亦豐惟欣樂太平之象而已蓋人性無不善其不善也皆蔽於物欲溺於習氣而然故放僻邪侈流而忘返必至傷其天年矣惟務縱其殺害嫉妬淫盜貪欲之心豈知民吾同胞物吾同氣而以慈愛接之焉能致國安民豐而樂太平也哉此固修養之士猶所當戒既聞經法即斂心凝神以鍊己度人為本久之歸根復命情冥性寂則可冀長生久視矣加以懲忿窒欲致虛守靜損之又損動靜語默無往不善則必能不殺不害不淫不盜矣又何華綺惡聲之戾哉至此則凡蠢動飛潛皆所慈愛初無親疏之間國猶身也能沖氣為和萬物皆育雖參贊化育陰翊皇祚皆由乎中也是所以致太平於國安民豐之域矣經始出教一國以道預有至心宗奉禮敬皆得度世此言天尊之始説經也一國之人皆遵道而行教之由是立也心乃曠劫以來之靈明也雖經教未出之先此心已具是日預有也特沉著幻妄迷惑蔽固則舍而亡矣今由經法濟度之後頓悟頓釋性歸命復一旦遵道而行萬妄歸真矣宗奉者宗猶本源也若水之宗海皆歸其源也禮敬者敬信之篤也故皆獲度世矣茍忘本而逐末舍源而求流其能度世乎經為道之徑心為道之宗能依經斂心則得經之妙矣道言元始天尊説經中所言並是諸天上帝內名隱韻之音亦是魔王內諱百靈之隱名也非世之常辭諸天上帝內名即三十二天名帝諱天帝玉字內音也隱韻即經中所謂諸天隱韻天中之音自然靈章也魔王內諱即五天魔王諱巴元醜伯也百靈隱名即無英白元桃康合延也並是天尊所宣説道君承教而述非世之凡俗所能知也內而求之如丹經所謂日魂月魄庚虎甲龍水銀朱砂紅鉛黑錫黃芽白雪姹女嬰兒黃婆金公陽火陰符玄關土釜爐鼎卦象之類雖異名别號之衆不過先天真一之氣為之丹祖也非因師指豈凡愚所能知也上聖已成真人通玄究微能悉其章誦之十過諸天遙唱萬帝設禮河海靜默山嶽藏雲日月停景璇璣不行羣魔束形鬼精滅爽回尸起死白骨成人此言真人修誦之功效也上聖已成如天帝高真宿修妙行聖功已成不假修習也真人由精心苦行鍊神養氣而後體合自然不滯有無永脫生滅是皆洞究玄微悟徹幽密故能悉盡其奧章即混洞赤文敷落五篇之類是也悉能詳盡則誦之十過諸天降臨萬帝鑒觀皆遙唱玉音設禮內諱靡不尊經之旨讚經之功也於是河海停波山嶽斂霧日月停輪星斗止曜群魔局迹鬼妖伏藏皆修誦之效致此大應猶能回尸起死白骨成人雖亡魂沉魄皆乘經功而更生矣十過之效在丹道則十月胎圓而神化矣諸天者即真鉛內融萬神和暢河海山嶽即愛河欲海也茍能一真獨露萬幻皆空則愛河浪止苦海波澄矣日月璇璣即大定神光洞照八識則外魔伏內魔滅矣至此則生身受度死魂受鍊豈無回骸起死之功哉至學之士誦之十過則五帝侍衛三界稽首魔精喪眼鬼妖滅爽濟度垂死絶而得生此言至學之士修誦之功效也至學乃篤至修學之士也仙師曰至學之士心堅如鐵石操烈於水火天地不能逾鬼神不能惑行人所不能行莫非力行之確也故誦經至十過則五氣之神侍衛聽命三界魔王亦稽首保舉矣此皆至學之士行積功立制魔則魔精懾伏不敢正視故喪眼也魔王既已保舉鬼妖皆束形滅爽矣以之濟度垂死已絶者度之復生內而求之五帝五臟之神也三界三尸六賊也魔精鬼妖七情六欲也人能遣欲澄心少思寡欲然後心靜神清精全氣固則五臟安寧三尸削滅六根清淨萬念俱空內魔既息則外魔自除矣以我鍊己之功濟度垂死之疾真氣所至雖絶者可生此皆身中十過丹基漸成之應也所以爾者學士穢氣未消體未洞真召制十方威未制天政德可伏御地祇束縳魔靈但却死而已不能更生此言常學之士修誦之功未至也天政日月五星在天謂之七政地祇嶽瀆山川祠廟社稷之神常學之士不能寡欲澄心至乃穢氣未除性理猶昧故體性未能洞真也所以爾者謂其不能若至學之士修誦功效之至也若乃召制十方之神其威未能制動天政其德厪可伏御地只之神攝伏魔靈但足以却死延年未能冀長生之道也蓋以神昏氣濁質穢念迷雖若護薄蝕禳五緯斬妖星拯旱潦誅蛟蜃降雨雪退潮汐之類凡干於天政者亦莫能制其應也地祇之神皆未能證其天品故其功德厪能伏御之茍學士修誦之篤一念不生萬緣頓息直造寶珠之境豈非洞真也輕誦此章身則被殃供養尊禮門户興隆世世昌熾與善因緣萬災不干神明護門此警常流下學之功罪也輕誦此章蓋經三天梵氣所結雲篆龍章非世常辭若茍且輕誦其褻慢之咎豈不被殃雖三洞經典必當攝心會神持誦勿怠況是經乎故薛幽棲曰不整形軀不按科儀行立坐卧聊爾誦念是為不敬若誦而不敬不若不誦而敬也辛君垂訓曰念經之初當攝萬念歸一即元始召十方也正念誦經即元始説經也情念識神不妄走即十方聽經也萬妄歸真即天人受度也此説可謂至矣下學之士能修持篤確供養尊禮必恭盡敬外則宅舍興盛內則身心安寧以至世世生生昌熾不息積善之至動與吉會災禍不侵凶惡退避必感神明之護衛矣斯經尊妙獨步玉京度人無量為萬道之宗巍巍大範德難可勝音升辛君曰大哉靈寶度人經不是文章撰得成諸經劫壞應須壞惟有斯文在玉京又曰自古及今上聖仙佛成道未有不奉度人經法者諸經中元始度人為上品經也蓋自元始祖劫化生諸天之始其混洞赤文空洞靈章所以開明三景周回十方五文開廓萬範開張生天地育萬物皆由是而為天地根也以至能召億萬天真無鞅數衆皆入一黍之內是為萬道之宗是謂無量普度無窮故至尊至妙而獨為玉京之上品也其巍巍之功德不可勝載矣是經也千真萬聖由此而修萬法千門由此而出是以亘古今而不壞先天地以長存縱之則彌滿六虛斂之則不盈一握釋氏所謂盡河沙界百千妙義盡於一毫端具者是也此無他曠劫以前本來之真性也豈不至尊妙哉故乃無量無窮其大範至德不可以限量勝載之茍能修之豈不獨步玉京哉辛君曰經以心傳經以心悟學者自宜具眼究竟矣道言凡誦是經十過諸天齊到億曾萬祖幽魂苦爽皆即受度上升朱宫格皆九年受化更生得為貴人而好學至經功滿德就皆得神仙飛升金闕遊宴玉京也此言不限人品高下誦持十過可以資其祖玄幽爽受度之功效也億曾萬祖謂元始以來捨身受身億世父母億劫種親也幽魂苦爽皆幽冥長夜未度魂爽也朱宫即南昌上宫朱陵火府也格者鍊度之格有三上學三年受度中智九年下學二十四年凡修誦之功不限人之品量賢愚但能攝念持心誦詠十過經功所至則感諸天下臨萬神齊到己之億曾萬祖外之幽魂苦爽皆獲受度上升朱宫頓乘經功而化生矣皆從中等之格受化更生而得為貴人矣是生於貴族不至淪墜也既獲更生其宿稟靈悟仍假薰修復積功德而後方證仙道則登神三境矣是以仍好學至經修誦勤篤之至日積月纍功滿德就則玉符保神金液鍊形久之形神俱妙則臣事金闕玉京矣上學之士修誦是經皆即受度飛升南宫太上曰上士聞道勤而行之蓋上學之士宿植善根其修行持誦終始弗怠故精進不已功德深重則生身受度保命生根不拘品格徑上南宫幽樓曰魂魄升仙則火鍊鬼質生身受度則火鍊垢穢故勤行之士名注仙籍皆飛神南宫然後登真信不難矣世人受誦則延壽長年後皆得作尸解之道魂神暫滅不經地獄即得返形遊行太空此言常流之人受誦之功效也世之常流積誦之久默悟經旨則可駐景延年及身謝之後亦得尸解之道雖其魂神暫滅然善因克至亦不經地獄之苦即返形太空神魂亦度朱陵矣是皆以宿慶善根獲生人道雖能精心受誦未明修鍊之旨止可得考終遐算而已天數既盡終歸生滅形獲尸解則神無輪轉非冥曹陰境之所能拘其脫形蛻迹亦可返真性於陰氣之中神超空漠則遊行太空之境矣此經微妙普度無窮一切天人莫不受慶無量之福生死蒙惠前言尊妙此重讚以微妙道君示人慈懇之至是所以有普度無窮之功也故修持之篤經功所至天人莫不受慶以至祖玄幽爽亦皆受度其無量之福不可以限量視之生身既受度矣而死魂亦皆受鍊是乃生死俱蒙天尊之惠矣然經之微妙人皆具足非修之於身證十回鍊己之功又豈能普度無窮也哉如能心悟經法克臻金液之微妙久之十轉回靈以召十方則先亡遠識咸蒙解脫色身亦躋神化豈不生死蒙惠哉上天所寶不傳下世至士齎金寶效心盟天而傳輕泄漏慢殃及九祖長役鬼官觀道君禁戒之嚴則知是經之寶祕於上天也蕭觀復曰三洞真經列於金格玄都所祕萬劫一開在昔劫運蹇屯世途否塞西臺龜母請于玉京由是玉宸道君付子玄一真人玄一真人付於太極徐真人太極真人付于葛仙公傳行於世則上天之所寶祕不傳豈下士所能知也至士乃至學之士必齎金寶效心盟天而傳天之所寶者皆內名隱諱赤文洞章至士齎金寶以破其慳吝之心增其珍惜之念使視經猶愛重金寶也茍或輕泄漏慢豈不殃及祖玄而受考於鬼官也仙師曰輕謂授之非人泄謂行之不密漏謂守之不固慢謂奉之不虔四者有一身則受殃矣鬼官天徒為驅雷役電官地徒擔沙負石官水徒漣汲溟波官是死魂受責於鬼官也侍經五帝玉童玉女各二十四人營衛神文保護受經者身此言修誦之士感上帝仙靈之衛護也少微曰五帝五老上帝也五帝侍經飛天下觀命玉童玉女合百二十人營衛經文保護佩誦者之身凡修真之士多為外魔所障易生退轉故中道而懈怠者衆矣道君既言泄慢之報戒之嚴重復付授神靈令其營衛神文保護受經之人所以消魔禦患也天尊之慈憫可謂周至矣修學之士可不體其訓信受奉持無致泄慢之咎哉道言正月長齋誦詠是經為上世亡魂斷地逮役度上南宫七月長齋誦詠是經身得神仙諸天書名黃籙白簡削死上生十月長齋誦詠是經為國王帝主君臣父子安鎮國祚保天長存世世不絶長為人君安鎮其方民稱太平此言學人當於三元八節本命之日修誦之功用也正月上元大慶之月四始之首建寅為鬼道故當誦詠以度上世亡魂斷地司之拘逮鬼官之役而度品南宫矣七月中元大慶之月建申為人道故當誦詠以度己身諸天紀名上生落死名標於黃籙白簡之上少微曰即紀仙之籍也十月下元大慶之月建亥為天門則當上為國王帝主君臣父子保佑國土清平運祚長遠世世長為人君四方安鎮物無疵癘生民皆稱太平之治矣蓋三元所統宰三宫九府百二十曹考校罪福皆所隸焉故上為國祚次為宗先次為己身皆當於是月長齋誦經祈福開度必天人受慶生死蒙惠獲福無量矣八節之日誦詠是經得為九宫真人本命之日誦詠是經魂神澄正萬氣長存不經苦惱身有光明三界侍衛五帝伺迎萬神朝禮名書上天功滿德就飛升上清八節之日四立為四季之首二分二至為陰陽之交故三界之考校罪福繫焉仙經曰元始天尊於是日分遣天帝天君天神真仙兵馬神祇教化人間開度羣品北斗南曹四司五帝亦復下降條録罪福含氣之流每至是日各有變化飛走蠕動水陸飛沉隨緣感應改故易新輕或更重重或更輕善惡回换氣象之運自然而然上學之士當於此日存誠祈謝因變行化入正去邪鍊偽成真開度羣品生成萬彙故當誦持禮敬務以習吉除凶進善屏惡趨明棄暗勵志思真內積真功外修實行則可無罪福之報矣八節與八卦九宫相表裏故八節誦經得為九宫真人本命之日即每歲六度降日也三魂藏於肝屬木其數三故曰三魂七魄藏於肺屬金其數七故曰七魄人身之三魂一魂居直本宿宫一魂居地府一魂居形內七魄常去而不散也遇本命之日魂神降體就尸合同循環歸降不絶則人生安穩災病不生若其日清淨身心絶酒色衣新潔焚香習善更於其日眠睡少時即魂與魄合陰與陽平道氣內隆命根堅固若嗜酒色昏亂形體則魂歸時去身三步之遠取合不能穢氣充身魂復再往三度昏亂不合魄者則陽衰陰旺魂與陰鬼交通致使夢遊衆惡耽睡迷亂災病俱生人能於本命之日修齋誦經則有如上感應功滿德就三界待衛五帝司迎而候升舉矣青元曰人作諸不善則魂怒而神靈去體知其同入惡道故也作一切善則魂喜而百神集知其同入正道故也修學之士可不慎歟道言行道之日皆當香湯沐浴齋戒入室東向叩齒三十二通上聞三十二天心拜三十二過閉目靜思身坐青黃白三色雲氣之中內外蓊冥有青龍白虎朱雀玄武獅子白鶴羅列左右日月照明洞煥室內頂生圓象光映十方如此分明凡誦經之日先披服盥漱淨心滌慮入室東向正坐持誦注心歷目微聲誦詠務令神魂和暢氣定息調然後叩齒令響內以集神外以徹天心拜三十二天閉目潛思身坐玄元始三氣之中內外洞煥存肝中青氣自目出化為青龍居左存肺中白氣自鼻出化為白虎居右存心中赤氣自口出化為朱雀居前存腎中黑氣自耳出化為玄武居後皆羅列左右左目合太陽右目合太陰日月之光朗徹室內項中圖象九色垂芒光映十方之上密呪曰密者低聲也呪者祝也默菴曰自下文無上玄元起至至尊几前一段即低聲禱祝之言不必别誦呪其貪羅鬱羅乃後人加豈宜誦之且毋使太速茍貪遍數氣濁聲喧返成褻慢矣無上玄元太上道君召出臣身中三五功曹左右官使者侍香金童傳言玉女五帝直符直日香官各三十二人出關啓所言今日吉慶長齋清堂修行至經無量度人臣及甲乙轉經受生願所啓上徹徑御無上三十二天元始上帝至尊几前畢引氣三十二過東向誦經無上玄元三境之總稱誦持當奏元始故先啓道君存於己身之首泥丸宫中身中三五功曹等神存自身中出森列左右前後每一人詣一天各三十二人並出關啓所言具位默奏事意當隨所禱至誠述事今日吉慶長齋今日者某日吉慶如不長齋止言持齋清堂修行至經若不明三洞中盟之道平時不曾修行則但言清堂誦經無量度人為十方幽顯言或為一事則只言為某事誦經臣及甲乙為己不言及為人不言臣徑御無上三十二天元始上帝至尊几前乃三十二天帝并元始上帝几前引氣三十二過亦每天引一氣也東向者以其生氣之始也內外三氣洞明依法持誦元始無量度人上品妙經通義卷之一
